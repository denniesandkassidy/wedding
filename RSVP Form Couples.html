<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dennies & Kassidy's RSVP</title>
    <!-- Basic Favicon -->
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">

    <!-- Apple Touch Icon (for iPhones and iPads) -->
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

    <!-- Android Icon (for Chrome on Android) -->
    <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">

    <!-- Web App Manifest Icon -->
    <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">

    <!-- Optional: Include a favicon.ico for legacy browsers -->
    <link rel="icon" href="favicon.ico" sizes="any">   
    <link href="output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Waterfall&display=swap" rel="stylesheet">
    <style>
        /* General Styling */
        body {
            background: url('https://ucarecdn.com/8464631e-8b52-4de3-b2c3-dd1ee0b1bffe/788F221B69F949EC8D3D7BD05F3EC49B.jpg') center center / cover no-repeat;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Prevent body from scrolling */
        }

        .container {
            background-color: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            text-align: center;
            max-height: 90vh;
            overflow-y: auto;
        }

        h1 {
            font-size: 2rem;  /* Increased font size for better readability */
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 1.5rem; /* Adjusted sub-heading font size */
            color: #333;
            margin-bottom: 15px;
        }

        label {
            font-size: 1rem;
            color: #555;
            margin-bottom: 8px;
            align-self: flex-start;
            display: block;
        }

        /* Input Styling */
        input[type="text"], select, textarea {
            width: 100%; /* Set width to 100% to match the button */
            padding: 14px; /* Increased padding for better spacing */
            font-size: 1.1rem; /* Larger text for input fields */
            margin-bottom: 18px; /* Increased margin for better spacing */
            border: 2px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
            transition: border-color 0.3s ease-in-out;
            box-sizing: border-box; /* Ensures padding and border are included in width */
        }

        /* Focus Styles */
        input:focus, select:focus, textarea:focus {
            border-color: #0073e6;
            outline: none;
        }

        /* Textarea styling */
        textarea {
            height: 150px; /* Increased height for better space */
            resize: vertical;
        }

        /* Button Styling */
        button {
            width: 100%;
            padding: 16px;
            font-size: 1.2rem; /* Larger text on the button */
            color: white;
            background-color: #0073e6;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #005bb5;
        }
    </style>
</head>
<body>
    <div class="container">
        <form id="rsvpFormCouples" name="rsvpFormCouples" method="POST" data-netlify="true">
            <h1 class="text-8xl sm:text-9xl md:text-10xl font-bold mb-4 typing whitespace-normal" 
          style="font-family: 'Waterfall', cursive;">Dennies & Kassidy's Wedding RSVP</h1>
            <!-- Hidden Input for Form Identification -->
            <input type="hidden" name="form-name" value="rsvpFormCouples">

            <!-- Guest 1 Questions -->
            <h2>Guest 1</h2>
            <label for="guest1-name">Guest 1 Name</label>
            <input type="text" id="guest1-name" name="guest1-name" placeholder="Guest 1 Name" required readonly>

            <label for="guest1-attendance">Will Guest 1 be attending this event?</label>
            <select id="guest1-attendance" name="guest1-attendance" required>
                <option value="">Select an option</option>
                <option value="Attending">Attending</option>
                <option value="Not Attending">Not Attending</option>
            </select>

            <label for="guest1-entree">Please Select Guest 1's Entree</label>
            <select id="guest1-entree" name="guest1-entree">
                <option value="">Select an entree</option>
                <option value="Fish">Fish</option>
                <option value="Steak">Steak</option>
            </select>

            <label for="guest1-dietary">Guest 1's Dietary Restrictions or Allergies</label>
            <textarea id="guest1-dietary" name="guest1-dietary" placeholder="Enter details"></textarea>

            <label for="guest1-comments">Guest 1's Comments, Questions, or Concerns</label>
            <textarea id="guest1-comments" name="guest1-comments" placeholder="Enter details"></textarea>

            <!-- Guest 2 Questions -->
            <h2>Guest 2</h2>
            <label for="guest2-name">Guest 2 Name</label>
            <input type="text" id="guest2-name" name="guest2-name" placeholder="Guest 2 Name" required readonly>

            <label for="guest2-attendance">Will Guest 2 be attending this event?</label>
            <select id="guest2-attendance" name="guest2-attendance" required>
                <option value="">Select an option</option>
                <option value="Attending">Attending</option>
                <option value="Not Attending">Not Attending</option>
            </select>

            <label for="guest2-entree">Please Select Guest 2's Entree</label>
            <select id="guest2-entree" name="guest2-entree">
                <option value="">Select an entree</option>
                <option value="Fish">Fish</option>
                <option value="Steak">Steak</option>
            </select>

            <label for="guest2-dietary">Guest 2's Dietary Restrictions or Allergies</label>
            <textarea id="guest2-dietary" name="guest2-dietary" placeholder="Enter details"></textarea>

            <label for="guest2-comments">Guest 2's Comments, Questions, or Concerns</label>
            <textarea id="guest2-comments" name="guest2-comments" placeholder="Enter details"></textarea>

            <!-- Submit Button -->
            <button type="submit">Submit RSVP</button>
        </form>
    </div>

    <script>
        // Retrieve the names from the query string
        const urlParams = new URLSearchParams(window.location.search);
        const fullName = urlParams.get('name');

        if (fullName) {
            // Split the names using ampersand (&) as the delimiter
            const names = fullName.split('&');
            
            // Assign the first name to Guest 1 and the second name to Guest 2
            document.getElementById('guest1-name').value = names[0] || '';
            document.getElementById('guest2-name').value = names[1] || '';
        }
    </script>
</body>
</html>
