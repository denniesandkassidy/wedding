<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dennies & Kassidy's RSVP</title>
    <style>
        /* General Styling */
        body {
            background: url('https://ucarecdn.com/8464631e-8b52-4de3-b2c3-dd1ee0b1bffe/788F221B69F949EC8D3D7BD05F3EC49B.jpg') center center / cover no-repeat;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden; /* Prevents the body from scrolling */
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Ensures content starts from the top */
            align-items: center;
            width: 100%;
            max-width: 500px;
            height: 80vh; /* Fixed height for the container */
            overflow-y: auto; /* Allows scrolling if content exceeds container height */
            background-color: rgba(255, 255, 255, 0.85); /* Semi-transparent background */
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        h1 {
            font-size: 1.8rem;
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-size: 1rem;
            color: #555;
            margin-bottom: 8px;
            align-self: flex-start;
            display: block;
        }

        /* Input Styling */
        input[type="text"], select, textarea {
            width: 100%; /* Set width to 100% to match the button */
            padding: 14px; /* Increased padding for better spacing */
            font-size: 1.1rem; /* Larger text for input fields */
            margin-bottom: 18px; /* Increased margin for better spacing */
            border: 2px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
            transition: border-color 0.3s ease-in-out;
            box-sizing: border-box; /* Ensures padding and border are included in width */
        }

        /* Focus Styles */
        input:focus, select:focus, textarea:focus {
            border-color: #0073e6;
            outline: none;
        }

        /* Textarea styling */
        textarea {
            height: 120px;
            resize: vertical;
        }

        /* Button Styling */
        button {
            width: 100%; /* Button takes up 100% width */
            padding: 16px;
            font-size: 1.2rem; /* Larger text on the button */
            color: white;
            background-color: #0073e6;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #005bb5;
        }
    </style>
</head>
<body>
    <div class="container">
        <form id="rsvpFormSingles" name="rsvpFormSingles" method="POST" data-netlify="true">
            <h1 class="text-8xl sm:text-9xl md:text-10xl font-bold mb-4 typing whitespace-normal" 
            style="font-family: 'Waterfall', cursive;">Dennies & Kassidy's Wedding RSVP</h1>
            <!-- Hidden Input for Form Identification -->
            <input type="hidden" name="form-name" value="rsvpFormSingles">

            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your Name" required readonly>

            <label for="attendance">Will you be attending this event?</label>
            <select id="attendance" name="attendance" required>
                <option value="">Select an option</option>
                <option value="Attending">Attending</option>
                <option value="Not Attending">Not Attending</option>
            </select>

            <label for="entree">Please Select your Entree</label>
            <select id="entree" name="entree">
                <option value="">Select an entree</option>
                <option value="Fish">Fish</option>
                <option value="Steak">Steak</option>
            </select>

            <label for="dietary">Please provide any dietary restrictions or allergies</label>
            <textarea id="dietary" name="dietary" placeholder="Enter details"></textarea>

            <label for="comments">Any comments, questions, or concerns?</label>
            <textarea id="comments" name="comments" placeholder="Enter details"></textarea>

            <button type="submit">Submit RSVP</button>
        </form>
    </div>

    <script>
        // Retrieve the name from the query string
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name');

        // Set the name in the form field
        if (name) {
            document.getElementById('name').value = name;
        }
    </script>
</body>
</html>
