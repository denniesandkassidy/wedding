<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dennies & Kassidy's RSVP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: url('https://ucarecdn.com/8464631e-8b52-4de3-b2c3-dd1ee0b1bffe/788F221B69F949EC8D3D7BD05F3EC49B.jpg') center center / cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            text-align: center;
            max-height: 90vh;
            overflow-y: auto;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 1rem;
            margin: 10px 0 5px;
        }

        input[type="text"], select, textarea, button {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
        }

        input[type="checkbox"] {
            margin-right: 5px;
        }

        button {
            background-color: #0073e6;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #005bb5;
        }

        .guest-field, .entree-field, .dietary-field, .comments-field {
            display: none; /* Initially hide these fields */
        }

        .guest-label {
            font-size: 0.9rem;
            color: #555;
            margin-top: -10px;
        }

        .checkbox-container {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <form id="rsvpFormSinglesGuests" name="rsvpFormSinglesGuests" method="POST" data-netlify="true">
            <h1 class="text-8xl sm:text-9xl md:text-10xl font-bold mb-4 typing whitespace-normal" 
          style="font-family: 'Waterfall', cursive;">Dennies & Kassidy's Wedding RSVP</h1>
            <input type="hidden" name="form-name" value="rsvpFormSinglesGuests">

            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your Name" required readonly>

            <label for="attendance">Will you be attending this event?</label>
            <select id="attendance" name="attendance" required>
                <option value="">Select an option</option>
                <option value="Attending">Attending</option>
                <option value="Not Attending">Not Attending</option>
            </select>
        
            <label for="entree">Please Select your Entree</label>
            <select id="entree" name="entree">
                <option value="">Select an entree</option>
                <option value="Fish">Fish</option>
                <option value="Steak">Steak</option>
            </select>

            <label for="dietary">Please provide any dietary restrictions or allergies</label>
            <textarea id="dietary" name="dietary" placeholder="Enter details"></textarea>

            <label for="comments">Any comments, questions, or concerns?</label>
            <textarea id="comments" name="comments" placeholder="Enter details"></textarea>
            <label>
                <input type="checkbox" id="bringGuest" name="bringGuest"> Will you be bringing a guest?
            </label>

            <!-- Guest Name Section -->
            <div id="guestField" class="guest-field">
                <label for="guestName" class="guest-label">Guest's Name</label>
                <input type="text" id="guestName" name="guestName" placeholder="Enter your guest's name">
            </div>

            <!-- Entree Section -->
            <div id="entreeField" class="entree-field">
                <label for="entree">Please Select your Entree</label>
                <select id="entree" name="entree">
                    <option value="">Select an entree</option>
                    <option value="Fish">Fish</option>
                    <option value="Steak">Steak</option>
                </select>
            </div>

            <!-- Dietary Restrictions Section -->
            <div id="dietaryField" class="dietary-field">
                <label for="dietary">Please provide any dietary restrictions or allergies</label>
                <textarea id="dietary" name="dietary" placeholder="Enter details"></textarea>
            </div>

            <!-- Comments Section -->
            <div id="commentsField" class="comments-field">
                <label for="comments">Any comments, questions, or concerns?</label>
                <textarea id="comments" name="comments" placeholder="Enter details"></textarea>
            </div>

            <!-- Wrap checkbox and button in a container to create space between them -->
            <div class="checkbox-container">
                <button type="submit">Submit RSVP</button>
            </div>
        </form>
    </div>

    <script>
        // Retrieve the name from the query string
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name');
        if (name) {
            document.getElementById('name').value = name;
        }

        // Guest checkbox logic
        const bringGuestCheckbox = document.getElementById("bringGuest");
        const guestField = document.getElementById("guestField");
        const entreeField = document.getElementById("entreeField");
        const dietaryField = document.getElementById("dietaryField");
        const commentsField = document.getElementById("commentsField");

        bringGuestCheckbox.addEventListener("change", function () {
            if (bringGuestCheckbox.checked) {
                guestField.style.display = "block";
                entreeField.style.display = "block";
                dietaryField.style.display = "block";
                commentsField.style.display = "block";
            } else {
                guestField.style.display = "none";
                entreeField.style.display = "none";
                dietaryField.style.display = "none";
                commentsField.style.display = "none";
            }
        });

        // Form submission example
        document.getElementById("rsvpFormSinglesGuests").addEventListener("submit", function (e) {
            e.preventDefault();

            // Collect all the values, even hidden ones
            const formData = new FormData(this);

            // Check if the guest checkbox is checked and include the guest info
            const guestInfo = bringGuestCheckbox.checked
                ? `Guest's Name: ${document.getElementById("guestName").value.trim()}`
                : "No guest is being brought.";

            const entree = formData.get("entree");
            const dietary = formData.get("dietary");
            const comments = formData.get("comments");

            // Display the values in an alert
            let message = `RSVP Submitted\nName: ${name}\nAttendance: ${formData.get("attendance")}\n${guestInfo}`;
            if (entree) message += `\nEntree: ${entree}`;
            if (dietary) message += `\nDietary Restrictions: ${dietary}`;
            if (comments) message += `\nComments: ${comments}`;

            alert(message);
        });
    </script>
</body>
</html>
