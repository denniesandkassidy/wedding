<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dennies & Kassidy's RSVP</title>
    <!-- Basic Favicon -->
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">

    <!-- Apple Touch Icon (for iPhones and iPads) -->
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

    <!-- Android Icon (for Chrome on Android) -->
    <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">

    <!-- Web App Manifest Icon -->
    <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">

    <!-- Optional: Include a favicon.ico for legacy browsers -->
    <link rel="icon" href="favicon.ico" sizes="any">   
    <link href="output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Waterfall&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: url('https://ucarecdn.com/40d14a68-fe9a-4af1-a8dc-bb9a01578455/MuseumWalk.JPG') center center / cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            text-align: center;
            max-height: 90vh;
            overflow-y: auto;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 1rem;
            margin: 10px 0 5px;
        }

        input[type="text"], select, textarea {
            width: 100%; /* Set width to 100% to match the button */
            padding: 14px; /* Increased padding for better spacing */
            font-size: 1.1rem; /* Larger text for input fields */
            margin-bottom: 18px; /* Increased margin for better spacing */
            border: 2px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
            transition: border-color 0.3s ease-in-out;
            box-sizing: border-box; /* Ensures padding and border are included in width */
        }

        input[type="checkbox"] {
            margin-right: 5px;
        }

        button {
            width: 100%;
            padding: 16px;
            font-size: 1.2rem; /* Larger text on the button */
            color: white;
            background-color: #0073e6;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #005bb5;
        }

        .checkbox-container {
            margin-bottom: 20px;
        }



    </style>
</head>
<body>
    <div class="container">
        <form id="rsvpFormSinglesGuests" name="rsvpFormSinglesGuests" method="POST" data-netlify="true" netlify-honeypot="bot-field" accept-charset="utf-8" action="/">
            <h1 class="text-2xl sm:text-3xl md:text-4xl font-bold mb-4 typing whitespace-normal" style="font-family: 'Waterfall', cursive;">Dennies & Kassidy's Wedding RSVP</h1>
            <input type="hidden" name="form-name" value="rsvpFormSinglesGuests">

              <!-- Honeypot (hidden to humans) -->
  <p class="hidden" style="display:none;">
    <label>Don’t fill this out if you're human: <input name="bot-field" /></label>
  </p>

            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your Name" required readonly>

            <label for="attendance">Will you be attending this event?</label>
            <select id="attendance" name="attendance" required>
                <option value="">Select an option</option>
                <option value="Attending">Attending</option>
                <option value="Not Attending">Not Attending</option>
            </select>
        
            <label for="entree">Please Select your Entree</label>
            <select id="entree" name="entree">
                <option value="">Select an entree</option>
                <option value="Fish">Fish</option>
                <option value="Steak">Steak</option>
            </select>

            <label for="dietary">Please provide any dietary restrictions or allergies</label>
            <textarea id="dietary" name="dietary" placeholder="Enter details"></textarea>

            <!-- Guest Name Section -->
            <label for="guest2-name">Guest Name</label>
            <input type="text" id="guest2-name" name="guest2-name" placeholder="Leave blank if not bringing a guest">

            <label for="guest2-entree">Please Select Guest's Entree</label>
            <select id="guest2-entree" name="guest2-entree">
                <option value="">Select an entree</option>
                <option value="Fish">Fish</option>
                <option value="Steak">Steak</option>
            </select>

            <label for="guest2-dietary">Guest's Dietary Restrictions or Allergies</label>
            <textarea id="guest2-dietary" name="guest2-dietary" placeholder="Enter details"></textarea>
            
            <button class="mb-4 px-6 py-3 text-lg font-semibold text-white bg-black rounded-lg transition-all duration-300 hover:bg-yellow-600 hover:text-black" type="submit">
                Submit RSVP
            </button>
            <button class="mb-4 px-6 py-3 text-lg font-semibold text-white bg-black rounded-lg transition-all duration-300 hover:bg-yellow-600 hover:text-black" type="button" onclick="window.location.href='RSVP Form Copy.html'">
                Previous Page
            </button>
        </form>
    </div>

    <script>
        // Retrieve the name from the query string
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name');
      
        if (name) {
          // Take only the part before the ampersand (&)
          const trimmedName = name.split('&')[0].trim();
          document.getElementById('name').value = trimmedName;
        }
      </script>      
</body>
</html>
