<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kassidy & Dennies' Wedding RSVP</title>
    <style>
        /* General Styling */
        body {
            background: url('https://ucarecdn.com/8464631e-8b52-4de3-b2c3-dd1ee0b1bffe/788F221B69F949EC8D3D7BD05F3EC49B.jpg') center center / cover no-repeat;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-size: 2rem;
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }

        /* Container Styling */
        .container {
            width: 100%;
            max-width: 600px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        /* Form Elements */
        label {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 8px;
            display: block;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #0073e6;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            color: white;
            background-color: #0073e6;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #005bb5;
        }
    </style>
</head>
<body>
    <div class="container">
        <form name="contact" method="POST" data-netlify="true" id="dynamicForm">
            <!-- Hidden Netlify Field -->
            <input type="hidden" name="form-name" value="contact">

            <!-- Primary Guest -->
            <h1>Kassidy & Dennies' Wedding RSVP</h1>
            <label for="rsvpName">Your Name</label>
            <input type="text" id="rsvpName" name="rsvpName" required placeholder="Enter your name">

            <!-- Placeholder Fields for Up to 5 Guests -->
            <!-- Guest 1 -->
            <div id="guest1">
                <input type="hidden" name="guest1_name" id="guest1_name">
                <label for="guest1_attendance">Will Guest 1 be attending?</label>
                <select name="guest1_attendance" id="guest1_attendance">
                    <option value="">Select an option</option>
                    <option value="Attending">Attending</option>
                    <option value="Not Attending">Not Attending</option>
                </select>

                <label for="guest1_entree">Guest 1's Entree</label>
                <select name="guest1_entree" id="guest1_entree">
                    <option value="">Select an entree</option>
                    <option value="Fish">Fish</option>
                    <option value="Steak">Steak</option>
                </select>

                <label for="guest1_dietary">Guest 1 Dietary Restrictions</label>
                <textarea name="guest1_dietary" id="guest1_dietary" placeholder="Enter details"></textarea>
            </div>

            <!-- Guest 2 -->
            <div id="guest2">
                <input type="hidden" name="guest2_name" id="guest2_name">
                <label for="guest2_attendance">Will Guest 2 be attending?</label>
                <select name="guest2_attendance" id="guest2_attendance">
                    <option value="">Select an option</option>
                    <option value="Attending">Attending</option>
                    <option value="Not Attending">Not Attending</option>
                </select>

                <label for="guest2_entree">Guest 2's Entree</label>
                <select name="guest2_entree" id="guest2_entree">
                    <option value="">Select an entree</option>
                    <option value="Fish">Fish</option>
                    <option value="Steak">Steak</option>
                </select>

                <label for="guest2_dietary">Guest 2 Dietary Restrictions</label>
                <textarea name="guest2_dietary" id="guest2_dietary" placeholder="Enter details"></textarea>
            </div>

            <!-- Add similar divs for Guest 3, Guest 4, and Guest 5 -->

            <!-- Submit Button -->
            <button type="submit">Submit RSVP</button>
        </form>
    </div>

    <script>
        // Example Function to Populate Guest Fields
        function populateGuestFields(guests) {
            guests.forEach((guest, index) => {
                const guestNumber = index + 1;
                if (guestNumber > 5) return; // Limit to 5 guests

                // Populate fields for each guest
                document.getElementById(`guest${guestNumber}_name`).value = guest.name;

                // Optionally auto-fill other fields
                // document.getElementById(`guest${guestNumber}_attendance`).value = "Attending";
                // document.getElementById(`guest${guestNumber}_entree`).value = "Fish";
            });
        }

        // Example Usage
        const guestList = [
            { name: "John Doe" },
            { name: "Jane Smith" },
        ];
        populateGuestFields(guestList);
    </script>
</body>
</html>
