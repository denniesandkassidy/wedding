<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dennies & Kassidy's RSVP</title>
    <!-- Basic Favicon -->
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">

    <!-- Apple Touch Icon (for iPhones and iPads) -->
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

    <!-- Android Icon (for Chrome on Android) -->
    <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">

    <!-- Web App Manifest Icon -->
    <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">

    <!-- Optional: Include a favicon.ico for legacy browsers -->
    <link rel="icon" href="favicon.ico" sizes="any">   
    <link href="output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Waterfall&display=swap" rel="stylesheet">
    <style>
        /* General Styling */
        body {
            background: url('https://ucarecdn.com/40d14a68-fe9a-4af1-a8dc-bb9a01578455/MuseumWalk.JPG') center center / cover no-repeat;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-size: 2rem;
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }

        /* Container Styling */
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 500px;
            background-color: rgba(255, 255, 255, 0.85); /* Semi-transparent background */
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        /* Input Fields */
        label {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 8px;
            align-self: flex-start;
        }

        input[type="text"], select, textarea {
            width: 100%; /* Set width to 100% to match the button */
            padding: 14px; /* Increased padding for better spacing */
            font-size: 1.1rem; /* Larger text for input fields */
            margin-bottom: 18px; /* Increased margin for better spacing */
            border: 2px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
            transition: border-color 0.3s ease-in-out;
            box-sizing: border-box; /* Ensures padding and border are included in width */
        }

        /* Focus Styles */
        input:focus, select:focus, textarea:focus {
            border-color: #0073e6;
            outline: none;
        }

        /* Buttons */
        button {
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            color: white;
            background-color: #0073e6;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #005bb5;
        }

        /* Error & Suggestions */
        .error {
            color: #e74c3c;
            font-size: 0.9rem;
            margin-top: 10px;
            text-align: center;
        }

        .suggestions {
            margin-top: 10px;
            font-size: 1rem;
            color: #333;
            text-align: center;
        }

        .match-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            border-radius: 10px;
        }

        .match-buttons button {
            background-color: rgba(83, 83, 83, 0.8); /* Semi-transparent background */
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .match-buttons button:hover {
            background-color: rgb(114, 0, 0);
        }
    </style>
</head>
<body>
    <div class="container">
        <form id="nameForm">
          <!-- Title -->
          <h1 class="text-2xl sm:text-3xl md:text-4xl font-bold mb-4 typing whitespace-normal" style="font-family: 'Waterfall', cursive;">
            Dennies & Kassidy's Wedding RSVP
          </h1>
          
          <!-- Input -->
          <label for="name">Enter Your Name</label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            placeholder="Type your full name" 
            required 
          />
          
          <!-- Buttons -->
          <button 
            class="mb-4 px-6 py-3 text-lg font-semibold text-white bg-black rounded-lg transition-all duration-300 hover:bg-yellow-600 hover:text-black" 
            type="submit">
            Find RSVP
          </button>
          
          <button 
            class="mb-4 px-6 py-3 text-lg font-semibold text-white bg-black rounded-lg transition-all duration-300 hover:bg-yellow-600 hover:text-black" 
            type="button" 
            onclick="window.location.href='RSVP Lookup.html'">
            RSVP'd already? Check!
          </button>
          
          <button 
            class="mb-4 px-6 py-3 text-lg font-semibold text-white bg-black rounded-lg transition-all duration-300 hover:bg-yellow-600 hover:text-black" 
            type="button" 
            onclick="window.location.href='index.html'">
            Home
          </button>
          
          <!-- Error Section -->
          <p class="error" id="error"></p>
          
          <!-- Match Buttons Section -->
          <div class="match-buttons" id="matchButtons"></div>
          
          <!-- Suggestions Section -->
          <p class="suggestions" id="suggestions"></p>
        </form>
      </div>
      
    

    <script>
        // List of valid names for singles without guests
        const validNames = ["Anuraag Nalluri", "Dave Fender", "Gabe Angeles", "Giovanni Sparacio", "Jackie Sweeney", "Jon Carroll", "Joseph Ragan", "Julia Dalzell", "Justin Dell'Osa", "Lizanne Rody", "Maggie Looney", "Malcolm Odum", "Meg Misciascio", "Nicole Lemanski", "Peter Scott", "Rachael Roberts", "Sherry DeGregorio", "Shiva Raisinghani", "Stephen Hensel", "Hoong Chung", "Jonathan Heo", "Joseph Heo", "Justin Rumpf", "Jonathan Valdes", "Timmy Parks", "Vanisha Harjani", "Sabrina Ramirez", "Katie Knapp", "Bobby Lattanzi", "Juan Giron", "Monica Oh", "Christopher Oh", "Henry Hubert", "Isabella Hubert"];
        
        // List of valid names for couples
        const validNames2 = ["AJ Bates & Irvin Lin", "Amy Huang & Nick Spinosi", "Andrew Hubert & Sydney Hubert", "Benjamin Hubert & Lauren Hubert", "Benjamin Valdes & Angie Zhou", "Bethey Gallagher & Patrick McClatchy", "Bomi Hong & Ryan Bond", "Catherine Jen & Dustin Jen", "Chris Rumpf & Ling Rumpf", "Christopher Hubert & Sami Stadsvold", "Cori Depice & Nick Puglisi", "Dae Kim & Paula Kim", "Dale Hawkins & Tonya Hawkins", "Dani Akehurst & Tyler Akehurst", "Daniel Chung & Jisoo Lee", "Dave Hubert & Lynn Hubert", "Gail Apgar & Tom Dillon", "George Hubert & Caroline Hubert", "Harold Hensel & Cathlyn Goggins", "Irene Fitzpatrick & Carol Fitzpatrick", "John Rody & Amanda Tallon-Rody", "Josh Kim & Michael Grady", "Justin LaCorte & Kierra LaCorte", "Karishma Harjani & Taylor Berkeley", "Kevin Chung & Angela Chung", "Kimmie Wodzanowski-Wilson & Kevin Wilson", "Kyle Spotts & Gail Podlesny", "Kyra Owen & AJ Pecora", "Lauren Hawkins & Connor Goggins", "Lauren Preski & Vincent Mastrobuono", "Leland Castro & Sharon Castro", "Maddy Fitzpatrick & Conor Fitzpatrick", "Madison Morley & Nick Bonavico", "Megan Minkiewicz & Alex Minkiewicz", "Mike Gannon & Maria Gannon", "Ray Keeler & Mercedes Keeler", "Rebecca DiMuzio & Michael DiMuzio", "Robert Quon & Mark Oliver", "Ryan Chung & Michelle Chung", "Sang An & Bob Bathrick", "Serge Huard & Cris Christensen", "Ted Chung & Jessica Chung", "Ted Foley & Samantha Melnick-Foley", "Vincent Alibrandi & Nicole Alibrandi", "Zachary Barden & Caitlyn Barden", "Jason Cook & Laura Snader", "Kevin O'Donnell & Briana Popolo", "Anthony Jackson & Shannon Hensel", "Patrick Corrigan & Sarah Hensel", "JJ Valdes & Chris Valdes", "Brian Rumpf & Deb Rumpf", "Se Oh & Susie Oh", "Ken Hubert & Ashley Hubert", "Jimmy Heo & Melissa Heo", "Brian Chung & Jessica Chung","Yoon Sik Kim & Young Soon Kim","Jillie Elder & Michael Elder"];
    
        // List of valid names for singles with guests
        const validNames3 = ["Chris McBride & Guest", "Raaj Singh & Guest", "Tara Callahan & Guest"];
    
        // Helper function to find similar matches
        function findSimilarNames(input, names) {
            const lowerInput = input.toLowerCase();
            return names.filter(name => name.toLowerCase().includes(lowerInput));
        }
    
        // Redirect to RSVP Form Singles.html if name matches validNames
        function redirectToRSVPSingles(name) {
            window.location.href = "RSVP Form Singles.html?name=" + encodeURIComponent(name);
        }
    
        // Redirect to RSVP Form Singles Guests.html if name matches validNames3
        function redirectToRSVPSinglesGuests(name) {
            window.location.href = "RSVP Form Singles Guests.html?name=" + encodeURIComponent(name);
        }
    
        // Redirect to RSVP Form Couples.html if name matches validNames2
        function redirectToRSVPCouples(name) {
            window.location.href = "RSVP Form Couples.html?name=" + encodeURIComponent(name);
        }
    
        // Form submit event handler
        document.getElementById("nameForm").addEventListener("submit", function (e) {
            e.preventDefault();
    
            const nameInput = document.getElementById("name").value.trim();
            const errorElement = document.getElementById("error");
            const suggestionsElement = document.getElementById("suggestions");
            const matchButtonsElement = document.getElementById("matchButtons");
    
            errorElement.textContent = "";
            suggestionsElement.textContent = "";
            matchButtonsElement.innerHTML = "";
    
            // Validate that the name is at least 3 characters long
            if (nameInput.length < 3) {
                errorElement.textContent = "Please enter at least 3 letters.";
                return;
            }
    
            // Check if the name is in validNames
            if (validNames.includes(nameInput)) {
                console.log("Redirecting to RSVP Form Singles...");
                redirectToRSVPSingles(nameInput);
                return;
            }
    
            // Check if the name is in validNames2
            if (validNames2.includes(nameInput)) {
                console.log("Redirecting to RSVP Form Couples...");
                redirectToRSVPCouples(nameInput);
                return;
            }
    
            // Check if the name is in validNames3
            if (validNames3.includes(nameInput)) {
                console.log("Redirecting to RSVP Form Singles Guests...");
                redirectToRSVPSinglesGuests(nameInput);
                return;
            }
    
            const matches = findSimilarNames(nameInput, validNames.concat(validNames2).concat(validNames3));
            
            console.log("Matching names:", matches);
    
            if (matches.length > 0) {
                suggestionsElement.textContent = "Did you mean one of these?";
                matches.forEach(match => {
                    const button = document.createElement("button");
                    button.type = "button";
                    button.textContent = match;
                    if (validNames.includes(match)) {
                        button.addEventListener("click", function () {
                            redirectToRSVPSingles(match);
                        });
                    } else if (validNames3.includes(match)) {
                        button.addEventListener("click", function () {
                            redirectToRSVPSinglesGuests(match);
                        });
                    } else {
                        button.addEventListener("click", function () {
                            redirectToRSVPCouples(match);
                        });
                    }
                    matchButtonsElement.appendChild(button);
                });
            } else {
                errorElement.textContent = "No match found. Please make sure your name is spelled correctly.";
            }
        });
        
    </script>    
</body>
</html>
