<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dennies & Kassidy's RSVP</title>
    <style>
        /* General Styling */
        body {
            background: url('https://ucarecdn.com/8464631e-8b52-4de3-b2c3-dd1ee0b1bffe/788F221B69F949EC8D3D7BD05F3EC49B.jpg') center center / cover no-repeat;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-size: 2rem;
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }

        /* Container Styling */
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 500px;
            background-color: rgba(255, 255, 255, 0.85); /* Semi-transparent background */
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        /* Input Fields */
        label {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 8px;
            align-self: flex-start;
        }

        input[type="text"], select, textarea {
            width: 100%; /* Set width to 100% to match the button */
            padding: 14px; /* Increased padding for better spacing */
            font-size: 1.1rem; /* Larger text for input fields */
            margin-bottom: 18px; /* Increased margin for better spacing */
            border: 2px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
            transition: border-color 0.3s ease-in-out;
            box-sizing: border-box; /* Ensures padding and border are included in width */
        }

        /* Focus Styles */
        input:focus, select:focus, textarea:focus {
            border-color: #0073e6;
            outline: none;
        }

        /* Buttons */
        button {
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            color: white;
            background-color: #0073e6;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #005bb5;
        }

        /* Error & Suggestions */
        .error {
            color: #e74c3c;
            font-size: 0.9rem;
            margin-top: 10px;
            text-align: center;
        }

        .suggestions {
            margin-top: 10px;
            font-size: 1rem;
            color: #333;
            text-align: center;
        }

        .match-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            border-radius: 10px;
        }

        .match-buttons button {
            background-color: rgba(83, 83, 83, 0.8); /* Semi-transparent background */
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .match-buttons button:hover {
            background-color: rgb(114, 0, 0);
        }
    </style>
</head>
<body>
    <div class="container">
        <form id="nameForm">
            <h1 class="text-8xl sm:text-9xl md:text-10xl font-bold mb-4 typing whitespace-normal" 
          style="font-family: 'Waterfall', cursive;">Dennies & Kassidy's Wedding RSVP</h1>
            <label for="name">Enter Your Name</label>
            <input type="text" id="name" name="name" placeholder="Type your full name" required>
            <button 
                class="mb-4 px-6 py-3 text-lg font-semibold text-white bg-black rounded-lg transition-all duration-300 hover:bg-yellow-600 hover:text-black" 
                type="submit">
                Find RSVP
            </button>
            <p class="error" id="error"></p>
            <div class="match-buttons" id="matchButtons"></div>
            <p class="suggestions" id="suggestions"></p>
        </form>
    </div>

    <script>
        // List of valid names for singles without guests and RSVP status
        const validNames = [
            { name: "Kassidy Rumpf", rsvp: "Attending" },
            { name: "Dennies Chung", rsvp: "Attending" },
            { name: "Oliver Chung", rsvp: "Attending" },
            { name: "Loki Chung", rsvp: "Not Attending" }
        ];

        // List of valid names for couples
        const validNames2 = [
            { name: "John Rody & Amanda Tallon", rsvp: "Attending" },
            { name: "Loki & Oliver", rsvp: "Attending" },
            { name: "Dennies & Kassidy", rsvp: "Not Attending" }
        ];

        // List of valid names for singles with guests
        const validNames3 = [
            { name: "Timmy Parks", rsvp: "Attending with guest" },
            { name: "Nick Udris", rsvp: "Not Attending" }
        ];

        // Helper function to find similar matches
        function findSimilarNames(input, names) {
            const lowerInput = input.toLowerCase();
            return names.filter(name => name.name.toLowerCase().includes(lowerInput));
        }

        // Form submit event handler
        document.getElementById("nameForm").addEventListener("submit", function (e) {
            e.preventDefault();

            const nameInput = document.getElementById("name").value.trim();
            const errorElement = document.getElementById("error");
            const suggestionsElement = document.getElementById("suggestions");
            const matchButtonsElement = document.getElementById("matchButtons");

            errorElement.textContent = "";
            suggestionsElement.textContent = "";
            matchButtonsElement.innerHTML = "";

            // Validate that the name is at least 3 characters long
            if (nameInput.length < 3) {
                errorElement.textContent = "Please enter at least 3 letters.";
                return;
            }

            // Check if the name is in validNames
            const foundName1 = validNames.find(person => person.name.toLowerCase() === nameInput.toLowerCase());
            if (foundName1) {
                suggestionsElement.textContent = `RSVP Status: ${foundName1.rsvp}`;
                return;
            }

            // Check if the name is in validNames2
            const foundName2 = validNames2.find(person => person.name.toLowerCase() === nameInput.toLowerCase());
            if (foundName2) {
                suggestionsElement.textContent = `RSVP Status: ${foundName2.rsvp}`;
                return;
            }

            // Check if the name is in validNames3
            const foundName3 = validNames3.find(person => person.name.toLowerCase() === nameInput.toLowerCase());
            if (foundName3) {
                suggestionsElement.textContent = `RSVP Status: ${foundName3.rsvp}`;
                return;
            }

            const matches = findSimilarNames(nameInput, [...validNames, ...validNames2, ...validNames3]);

            console.log("Matching names:", matches);

            if (matches.length > 0) {
                suggestionsElement.textContent = "Did you mean one of these?";
                matches.forEach(match => {
                    const button = document.createElement("button");
                    button.type = "button";
                    button.textContent = match.name;
                    button.addEventListener("click", function () {
                        suggestionsElement.textContent = `RSVP Status: ${match.rsvp}`;
                    });
                    matchButtonsElement.appendChild(button);
                });
            } else {
                errorElement.textContent = "No match found. Please make sure your name is spelled correctly.";
            }
        });
        
    </script>    
</body>
</html>
