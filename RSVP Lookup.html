  <style>
    /* General Styling */
    body {
      background: url('https://ucarecdn.com/40d14a68-fe9a-4af1-a8dc-bb9a01578455/MuseumWalk.JPG') center center / cover no-repeat;
      font-family: 'Arial', sans-serif;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; margin: 0; padding: 20px;
    }
    h1 { font-size: 2rem; color: #333; text-align: center; margin-bottom: 20px; }

    /* Container Styling */
    .container {
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      width: 100%; max-width: 500px;
      background-color: rgba(255, 255, 255, 0.85);
      border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 30px;
    }

    /* Inputs */
    label { font-size: 1.1rem; color: #555; margin-bottom: 8px; align-self: flex-start; display:block; }
    input[type="text"] {
      width: 100%; padding: 14px; font-size: 1.1rem; margin-bottom: 18px;
      border: 2px solid #ccc; border-radius: 8px; background-color: #f9f9f9;
      transition: border-color 0.3s ease-in-out; box-sizing: border-box;
    }
    input:focus { border-color: #0073e6; outline: none; }

    /* Buttons */
    button {
    width: 100%;
    padding: 14px;
    font-size: 1.1rem;
    color: white;
    background-color: #000000; 
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background-color 0.3s;
    }

    button:hover {
    background-color: #b8860b; /* darker gold hover */
    }


    /* Error & Suggestions */
    .error { color: #e74c3c; font-size: 0.9rem; margin-top: 10px; text-align: center; }
    .suggestions { margin-top: 10px; font-size: 1rem; color: #333; text-align: center; }

    .match-buttons {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 10px;
      max-height: 200px; overflow-y: auto; padding: 10px; border-radius: 10px;
    }
    .match-buttons button {
      background-color: rgba(83, 83, 83, 0.8);
      padding: 12px 20px; border-radius: 5px; cursor: pointer; transition: background-color 0.3s;
      width: auto; color: #fff;
    }
    .match-buttons button:hover { background-color: rgb(114, 0, 0); }

    /* Details block */
    .details {
    width: 100%;                /* take full width of the form */
    margin-top: 12px;
    padding: 16px;
    border: 1px solid #e5e5e5;
    border-radius: 10px;
    background: rgba(255, 255, 255, .9);

    box-sizing: border-box;     /* keeps padding inside width */
    word-wrap: break-word;      /* prevent text overflow */
    }

    .details h3 { margin: 0 0 10px; font-size: 1.1rem; color: #333; }
    .muted { font-size: .95rem; color: #444; margin: 6px 0; }
    .hidden { display: none; }

    .match-buttons {
    display: flex;
    flex-direction: column; /* stack vertically */
    gap: 10px;
    margin-top: 10px;
    max-height: 200px;
    overflow-y: auto;
    padding: 10px;
    border-radius: 10px;
    }

    .match-buttons button {
    background-color: rgba(83, 83, 83, 0.8);
    padding: 12px 20px;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s;
    color: #fff;

    width: 100%;            /* match Find RSVP */
    text-align: center;     /* center text */
    }

    .note {
    margin-top: 8px;
    font-size: 1.2rem;
    color: #555;
    text-align: center;
    font-style: italic;
    }
  </style>
</head>

    // ======= HELPERS =======
    function findSimilarNames(input, names) {
      const lower = input.toLowerCase();
      return names.filter(n => n.name.toLowerCase().includes(lower));
    }

    function resolveExactMatch(nameInput) {
      return validNames.find(p => p.name.toLowerCase() === nameInput.toLowerCase());
    }

    function showDetailsFor(person) {
      const details = document.getElementById('details');
      const statusLine = document.getElementById('statusLine');
      const entreeLine = document.getElementById('entreeLine');
      const dietaryLine = document.getElementById('dietaryLine');

      document.getElementById('detailsTitle').textContent = `RSVP for: ${person.name}`;
      statusLine.textContent = `RSVP Status: ${person.rsvp}`;
      entreeLine.textContent = `Entrée Selection: ${person.entree ? person.entree : "N/A"}`;
      dietaryLine.textContent = `Dietary Restrictions: ${person.dietary ? person.dietary : "N/A"}`;

      details.classList.remove('hidden');
    }

    // ======= EVENT HANDLER =======
    document.getElementById("nameForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const nameInput = document.getElementById("name").value.trim();
      const err = document.getElementById("error");
      const suggestions = document.getElementById("suggestions");
      const matchButtons = document.getElementById("matchButtons");
      const details = document.getElementById("details");

      err.textContent = "";
      suggestions.textContent = "";
      matchButtons.innerHTML = "";
      details.classList.add('hidden');

      if (nameInput.length < 3) {
        err.textContent = "Please enter at least 3 letters.";
        return;
      }

      // Exact match?
      const exact = resolveExactMatch(nameInput);
      if (exact) {
        showDetailsFor(exact);
        return;
      }

      // Similar matches
      const matches = findSimilarNames(nameInput, validNames);
      if (matches.length > 0) {
        suggestions.textContent = "Did you mean one of these?";
        matches.forEach(match => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = match.name;
          btn.addEventListener("click", () => showDetailsFor(match));
          matchButtons.appendChild(btn);
        });
      } else {
        err.textContent = "No match found. Please make sure your name is spelled correctly.";
      }
    });
  </script>
</body>
</html>
